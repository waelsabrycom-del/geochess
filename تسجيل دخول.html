<script>
    const API_URL = `${window.location.origin}/api`;

    // دالة لإظهار/إخفاء كلمة المرور
    function togglePassword(fieldId) {
        const field = document.getElementById(fieldId);
        if (field.type === 'password') {
            field.type = 'text';
        } else {
            field.type = 'password';
        }
    }

    // التعامل مع نموذج تسجيل الدخول
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const submitBtn = document.getElementById('submitBtn');

        // إخفاء الرسائل السابقة
        errorDiv.classList.add('hidden');
        successDiv.classList.add('hidden');

        // التحقق من البيانات
        if (!email || !password) {
            errorDiv.textContent = 'البريد الإلكتروني وكلمة المرور مطلوبة';
            errorDiv.classList.remove('hidden');
            return;
        }

        try {
            submitBtn.disabled = true;
            submitBtn.textContent = 'جاري الدخول...';

            const response = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            });

            const data = await response.json();

            if (data.success) {
                // حفظ التوكن والبيانات في localStorage
                localStorage.setItem('authToken', data.token);
                localStorage.setItem('userId', data.user.id);
                localStorage.setItem('username', data.user.username);
                localStorage.setItem('userLevel', data.user.level);
                localStorage.setItem('userRank', data.user.rank);
                localStorage.setItem('userType', data.user.user_type || 'player');

                successDiv.textContent = 'تم الدخول بنجاح! جاري التحويل...';
                successDiv.classList.remove('hidden');

                // التحويل إلى صفحة الملف الشخصي بعد 2 ثانية
                setTimeout(() => {
                    window.location.href = 'ملف اللاعب الشخصي.html';
                }, 2000);
            } else {
                errorDiv.textContent = data.message || 'فشل تسجيل الدخول';
                errorDiv.classList.remove('hidden');
            }
        } catch (error) {
            console.error('خطأ:', error);
            errorDiv.textContent = 'فشل الاتصال بالخادم. تأكد من تشغيل الخادم.';
            errorDiv.classList.remove('hidden');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'تسجيل الدخول';
        }
    });
</script>
