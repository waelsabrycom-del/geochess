
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>غرفة الانتظار - نسخة مصححة</title>
<link href="assets/local/fonts/local-fonts.css" rel="stylesheet"/>
<script src="assets/local/tailwind-cdn.js"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen p-6">

<h1 class="text-2xl font-bold mb-6">غرفة الانتظار (نسخة مستقرة)</h1>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4">

  <div class="bg-gray-800 p-4 rounded">
    <h2 class="font-bold text-yellow-400 mb-2">👑 المدير</h2>
    <div id="admin-name">...</div>
  </div>

  <div class="bg-gray-800 p-4 rounded">
    <h2 class="font-bold text-green-400 mb-2">🥇 اللاعب الأول</h2>
    <div id="player1-name">...</div>
  </div>

  <div class="bg-gray-800 p-4 rounded">
    <h2 class="font-bold text-blue-400 mb-2">🥈 اللاعب الثاني</h2>
    <div id="player2-name">...</div>
  </div>

</div>

<script>
const API_URL = `${window.location.origin}/api`;
const gameId = localStorage.getItem("gameId");
const currentUserId = parseInt(localStorage.getItem("userId"), 10);

let lastRenderHash = "";

/**
 * Renderer موحد - مصدر الحقيقة الوحيد
 */
function renderRoles(game, settings) {
  const adminId = parseInt(settings.tournamentAdminId, 10) || null;
  const player1Id = parseInt(settings.player1Id, 10) || null;
  const player2Id = parseInt(settings.player2Id, 10) || null;

  document.getElementById("admin-name").textContent =
    adminId ? `ID: ${adminId}` : "لا يوجد مدير";

  document.getElementById("player1-name").textContent =
    player1Id ? `ID: ${player1Id}` : "بانتظار اللاعب الأول";

  document.getElementById("player2-name").textContent =
    player2Id ? `ID: ${player2Id}` : "بانتظار اللاعب الثاني";
}

/**
 * تحميل البيانات بدون أي تعديل على host_id
 */
async function loadGameData() {
  try {
    const res = await fetch(`${API_URL}/games/${gameId}`);
    if (!res.ok) return;

    const data = await res.json();
    if (!data.success) return;

    const game = data.game;

    let settings = {};
    try {
      settings = typeof game.game_settings === "string"
        ? JSON.parse(game.game_settings)
        : game.game_settings || {};
    } catch {}

    // منع إعادة الرسم إذا لم تتغير البيانات
    const hash = JSON.stringify({
      admin: settings.tournamentAdminId,
      p1: settings.player1Id,
      p2: settings.player2Id
    });

    if (hash === lastRenderHash) return;
    lastRenderHash = hash;

    renderRoles(game, settings);

  } catch (e) {
    console.error(e);
  }
}

// أول تحميل
loadGameData();

// تحديث كل 3 ثواني (بدون Flicker)
setInterval(loadGameData, 3000);
</script>

</body>
</html>
